<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizMaster — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #08101f;
      --surface: rgba(255, 255, 255, 0.05);
      --surface-strong: rgba(255, 255, 255, 0.10);
      --surface-soft: rgba(255, 255, 255, 0.03);
      --panel: rgba(255, 255, 255, 0.06);
      --panel-strong: rgba(255, 255, 255, 0.11);
      --text: #ebf2ff;
      --text-muted: #97a5c2;
      --text-soft: rgba(235, 242, 255, 0.78);
      --primary: #2c3b7a;
      --accent: #8b5cf6;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: rgba(255, 255, 255, 0.12);
      --shadow: 0 32px 90px rgba(0, 0, 0, 0.22);
      --gray-50: #f8fafc;
      --gray-600: #475569;
      --gray-900: #0f172a;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #0b1223 0%, #071322 100%);
      color: var(--text);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .left-panel {
      background: linear-gradient(145deg, #071322 0%, #1d2d57 35%, #2c3b7a 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }

    .left-panel::before,
    .left-panel::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05)
    }

    .left-panel::before {
      width: 400px;
      height: 400px;
      top: -100px;
      left: -100px
    }

    .left-panel::after {
      width: 300px;
      height: 300px;
      bottom: -80px;
      right: -80px
    }

    .brand {
      color: white;
      text-align: center;
      z-index: 1
    }

    .brand-icon {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      border: 1px solid rgba(255, 255, 255, 0.2)
    }

    .brand h1 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 12px
    }

    .brand p {
      font-size: 16px;
      opacity: 0.8;
      line-height: 1.6;
      max-width: 320px
    }

    .steps {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 1;
      width: 100%;
      max-width: 360px
    }

    .step-item {
      display: flex;
      align-items: center;
      gap: 14px;
      color: white
    }

    .step-num {
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px
    }

    .step-item span {
      font-size: 14px;
      font-weight: 500;
      opacity: 0.9
    }

    .right-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      background: #f8fafc;
      color: var(--gray-900)
    }

    .form-container {
      width: 100%;
      max-width: 440px
    }

    .form-header {
      margin-bottom: 36px
    }

    .form-header h2 {
      font-size: 28px;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 8px
    }

    .form-header p {
      color: var(--gray-600);
      font-size: 15px
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px
    }

    .form-group {
      margin-bottom: 20px
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center
    }

    .input-wrapper i {
      position: absolute;
      top: 50%;
      left: 16px;
      transform: translateY(-50%);
      color: var(--gray-600);
      font-size: 16px;
      z-index: 2
    }

    .input-wrapper input,
    .input-wrapper select {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 14px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: var(--gray-900);
      background: #f6f7fb;
      outline: none;
      transition: all 0.2s
    }

    .input-wrapper input:focus,
    .input-wrapper select:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1)
    }

    .toggle-pass {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--gray-600);
      font-size: 15px;
      transition: color 0.2s;
      z-index: 2
    }

    .toggle-pass.left {
      left: 16px;
      right: auto
    }

    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px
    }

    .role-card {
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255, 255, 255, 0.04)
    }

    .role-card:hover {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.06)
    }

    .role-card.active {
      border-color: var(--primary);
      background: rgba(91, 118, 255, 0.12)
    }

    .role-card i {
      font-size: 24px;
      color: var(--gray-400);
      margin-bottom: 8px;
      display: block
    }

    .role-card.active i {
      color: var(--primary)
    }

    .role-card span {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-600)
    }

    .role-card.active span {
      color: var(--primary)
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(79, 70, 229, 0.4)
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px
    }

    .alert.error {
      background: #fef2f2;
      color: var(--danger);
      border: 1px solid #fecaca;
      display: flex
    }

    .alert.success {
      background: #f0fdf4;
      color: var(--success);
      border: 1px solid #bbf7d0;
      display: flex
    }

    .bottom-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--gray-400)
    }

    .bottom-link a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none
    }

    @media (max-width:768px) {
      body {
        grid-template-columns: 1fr
      }

      .left-panel {
        display: none
      }

      .right-panel {
        padding: 40px 24px
      }
    }
  </style>
</head>

<body>
  <div class="left-panel">
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
      <h1>QuizMaster</h1>
      <p>Join thousands of students and educators using QuizMaster for smarter assessments.</p>
    </div>
    <div class="steps">
      <div class="step-item">
        <div class="step-num">1</div><span>Create your account</span>
      </div>
      <div class="step-item">
        <div class="step-num">2</div><span>Choose your role</span>
      </div>
      <div class="step-item">
        <div class="step-num">3</div><span>Start taking or creating quizzes</span>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-container">
      <div class="form-header">
        <h2>Create an account ✨</h2>
        <p>Fill in your details to get started</p>
      </div>

      <div class="alert" id="alert">
        <i class="fas fa-exclamation-circle"></i>
        <span id="alert-text"></span>
      </div>

      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrapper">
          <i class="fas fa-user icon"></i>
          <input type="text" id="name" placeholder="Muhammad Ali" />
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope icon"></i>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fas fa-eye toggle-pass left" id="toggle-pass" onclick="togglePassword()"></i>
          <input type="password" id="password" placeholder="Min. 6 characters" />
        </div>
      </div>

      <div class="form-group">
        <label>I am a</label>
        <div class="role-selector">
          <div class="role-card active" id="role-student" onclick="selectRole('student')">
            <i class="fas fa-user-graduate"></i>
            <span>Student</span>
          </div>
          <div class="role-card" id="role-admin" onclick="selectRole('admin')">
            <i class="fas fa-chalkboard-teacher"></i>
            <span>Admin / Teacher</span>
          </div>
        </div>
      </div>

      <button class="btn-primary" id="register-btn" onclick="register()">
        <i class="fas fa-user-plus"></i> Create Account
      </button>

      <div class="bottom-link">
        Already have an account? <a href="login.html">Sign in here</a>
      </div>
    </div>
  </div>

  <script>
    let selectedRole = 'student';

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('role-student').classList.toggle('active', role === 'student');
      document.getElementById('role-admin').classList.toggle('active', role === 'admin');
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('toggle-pass');
      input.type = input.type === 'password' ? 'text' : 'password';
      icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
    }

    function showAlert(msg, type) {
      const alert = document.getElementById('alert');
      alert.className = `alert ${type}`;
      document.getElementById('alert-text').textContent = msg;
    }

    async function register() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('register-btn');

      if (!name || !email || !password) { showAlert('Please fill in all fields.', 'error'); return; }
      if (password.length < 6) { showAlert('Password must be at least 6 characters.', 'error'); return; }

      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
      btn.style.opacity = '0.8'; btn.style.pointerEvents = 'none';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role: selectedRole })
        });
        const data = await res.json();
        if (res.ok) {
          showAlert('Account created! Redirecting to login...', 'success');
          setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
          showAlert(data.message || 'Registration failed.', 'error');
          btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
          btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
        }
      } catch (err) {
        showAlert('Server error. Is backend running?', 'error');
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
        btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
      }
    }
  </script>
</body>

</html>
